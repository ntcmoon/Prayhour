</head>
<body>
    <header class="header" id="header">
        <nav class="navbar">
            <a href="index.html" class="logo">PRAYHOUR</a>
            
                <ul class="list">
                    <li class="hideOnMobile"><a href="suggest-us.html">ข้อเสนอแนะ</a></li>
                    <li class="hideOnMobile"><a href="support.html">สนับสนุน PrayHour</a></li>

        <script>
            function showSidebar(){
                const sidebar = document.querySelector('.sidebar')
                sidebar.style.display = 'flex'
            }

            function hideSidebar(){
                const sidebar = document.querySelector('.sidebar')
                sidebar.style.display = 'none'
            }
        </script>
        
    </header>

    <!--บทสวด-->
    <section class="wrapper">
        <div class="prayer">
            <h1 class="">บทสวดกรวดน้ำ (อิมินา)</h1>
            <div class="roundpray">
                <h2>รอบที่</h2>
                <ul class="round-pray">
                    <li>1</li>
                    <li>/</li>
                    <li>7</li>
                </ul>
            </div>
            <div class="button-ms">
                <button class="mean">ความหมาย</button>
                <button class="suggestion">คำแนะนำ</button>
             </div>
            <div class="bg">
                <p>
                    <object>
                    (บทนำ) หันทะ มะยัง อุททิสะนาธิฏฐานะ คาถาโย ภะณามะ เส ฯ

                    อิมินา ปุญญะกัมเมนะ อุปัชฌายา คุณุตตะรา
                    อาจะริยูปะการา จะ มาตาปิตา จะ ญาตะกา
                    สุริโย จันทิมา ราชา คุณะวันตา นะราปิ จะ
                    พ์รัห์มะมารา จะ อินทา จะตุ- โลกะปาลา จะ เทวะตา
                    ยะโม มิตตา มะนุสสา จะ มัชฌัตตา เวริกาปิ จะ
                    สัพเพ สัตตา สุขี โหนตุ ปุญญานิ ปะกะตานิ เม
                    สุขัญจะ ติวิธัง เทนตุ ขิปปัง ปาเปถะ โว มะตัง

                    อิมินา ปุญญะกัมเมนะ อิมินา อุททิเสนะ จะ
                    ขิปปาหัง สุละเภ เจวะ ตัณหุปาทานะเฉทะนัง
                    เย สันตาเน หินา ธัมมา ยาวะ นิพพานะโต มะมัง
                    นัสสันตุ สัพพะทาเยวะ ยัตถะ ชาโต ภะเว ภะเว
                    อุชุจิตตัง สะติปัญญา สัลเลโข วิริยัมหินา
                    มารา ละภันตุ โนกาสัง กาตุญจะ วิริเยสุ เม
                    พุทธาทิปะวะโร นาโถ ธัมโม นาโถ วะรุตตะโม
                    นาโถ ปัจเจกะพุทโธ จะ สังโฆ นาโถตตะโร มะมัง
                    เตโสตตะมานุภาเวนะ มาโรกาสัง ละภันตุ มา ฯ
                    </object>
                </p>
            </div>

            </div>
        </div>

            </div>
            <div class="next">

    </section>
